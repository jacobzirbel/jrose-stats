<header class="topbar">
  <a routerLink="/" class="brand">jrose-stats</a>
  <nav>
    @if (auth.user(); as user) {
      <span>{{ user.username }}</span>
      <button type="button" (click)="logout()">Log out</button>
    } @else if (auth.loaded()) {
      <a routerLink="/login">Log in</a>
      <a routerLink="/signup">Sign up</a>
    }
  </nav>
</header>

<main>
  <router-outlet />
</main>
